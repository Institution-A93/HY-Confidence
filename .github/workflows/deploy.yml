# Deploy on every push to main — this is what makes "main = production". Two targets, both
# gated on the same build (typecheck + tests + build) so a red suite blocks BOTH:
#   • frontend → GitHub Pages (static site).  Pages source must be set to "GitHub Actions"
#     once (Settings → Pages → Source); the workflow token cannot enable Pages (org policy).
#   • backend  → the DigitalOcean droplet (159.65.120.201) over SSH: `git pull` + service
#     restart. The backend runs the Fact adapters server-side (scraping can't run on Pages),
#     so a push that only updates Pages would leave the live Facts stale — both must deploy.
# vite.config base is "./" so assets resolve under the project subpath.
name: Deploy (Pages frontend + droplet backend)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # Backend deploy: SSH into the droplet, fast-forward the checkout, restart the systemd service.
  # Runs in parallel with the Pages deploy (both only need `build`), so a green suite ships both.
  # The key is passed via env (not ${{ }} interpolation into the script) so the multi-line PEM is
  # placed verbatim and never expanded by the shell; ssh-keyscan pins the host key (no TOFU prompt).
  deploy-backend:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to droplet over SSH
        env:
          DROPLET_SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DROPLET_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H 159.65.120.201 >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes root@159.65.120.201 \
            'cd /opt/hy-confidence && git pull -q && systemctl restart hy-confidence && systemctl is-active hy-confidence'
