# Build the Vite app and deploy it to GitHub Pages on every push to main.
# This is what makes "main = production": a merge to main publishes the live site.
# Pages is enabled automatically by the configure-pages step (enablement: true). If org
# policy blocks token-based enablement, flip it once: Settings → Pages → Source → "GitHub
# Actions". vite.config base is "./" so assets resolve under the project subpath.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true # turn Pages on via the workflow token — no manual Settings toggle
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
